<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Air Jordon HVAC — Accounting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="login-screen hidden">
    <div class="login-card">
      <div class="login-brand">
        <div class="logo-mark">AJ</div>
        <div>
          <h1 class="brand-name">AIR JORDON HVAC</h1>
          <div class="brand-tag">Accounting · Internal</div>
        </div>
      </div>

      <div id="login-form">
        <label class="field">
          <span class="field-label">Email</span>
          <input type="email" id="login-email" placeholder="you@airjordonhvac.com" autocomplete="email" />
        </label>
        <button id="login-btn" class="btn-primary">Send magic link</button>
        <p id="login-status" class="login-status"></p>
      </div>

      <div class="login-footer">
        <span class="licenses">TX TACLA150420E · LA CL.02359</span>
        <span class="mbe-badge">MBE Certified</span>
      </div>
    </div>
  </div>

  <!-- APP SHELL -->
  <div id="app-shell" class="app-shell hidden">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="logo-mark">AJ</div>
        <div class="sidebar-brand-text">
          <div class="brand-name-sm">AIR JORDON</div>
          <div class="brand-tag-sm">Accounting</div>
        </div>
      </div>

      <nav class="sidebar-nav" id="sidebar-nav">
        <a href="#/dashboard" data-route="dashboard">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
          <span>Dashboard</span>
        </a>
        <a href="#/inbox" data-route="inbox">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/></svg>
          <span>Inbox</span>
        </a>
        <a href="#/customers" data-route="customers">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
          <span>Customers</span>
        </a>
        <a href="#/vendors" data-route="vendors">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
          <span>Vendors</span>
        </a>
        <a href="#/projects" data-route="projects">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
          <span>Projects</span>
        </a>

        <div class="nav-section">RECEIVABLES</div>
        <a href="#/invoices" data-route="invoices">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
          <span>Invoices</span>
        </a>

        <div class="nav-section">PAYABLES</div>
        <a href="#/bills" data-route="bills">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 4H3a2 2 0 00-2 2v12a2 2 0 002 2h18a2 2 0 002-2V6a2 2 0 00-2-2z"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
          <span>Bills</span>
        </a>
        <a href="#/payments" data-route="payments">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
          <span>Payments</span>
        </a>

        <div class="nav-section">BANKING</div>
        <a href="#/bank" data-route="bank">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 10 12 3 23 10 23 10 1 10 1 10"/><line x1="3" y1="10" x2="3" y2="21"/><line x1="21" y1="10" x2="21" y2="21"/><line x1="1" y1="21" x2="23" y2="21"/></svg>
          <span>Bank</span>
        </a>
        <a href="#/reconcile" data-route="reconcile">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          <span>Reconcile</span>
        </a>

        <div class="nav-section">REPORTING</div>
        <a href="#/reports" data-route="reports">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          <span>Reports</span>
        </a>
        <a href="#/ten99" data-route="ten99">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><text x="7" y="17" font-size="7" fill="currentColor" stroke="none" font-family="monospace">1099</text></svg>
          <span>1099s</span>
        </a>
        <a href="#/settings" data-route="settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          <span>Settings</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="user-chip">
          <div class="user-avatar" id="user-avatar">?</div>
          <div class="user-meta">
            <div class="user-name" id="user-name">—</div>
            <div class="user-role" id="user-role">—</div>
          </div>
          <button id="logout-btn" class="icon-btn" title="Sign out">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main">
      <div id="route-outlet"></div>
    </main>
  </div>

  <!-- TOAST & MODAL MOUNTS -->
  <div id="toast-stack"></div>
  <div id="modal-mount"></div>

  <!-- LOADING SPLASH -->
  <div id="boot-splash" class="boot-splash">
    <div class="boot-mark">AJ</div>
    <div class="boot-dots"><span></span><span></span><span></span></div>
  </div>

  <script src="config.js"></script>
  <script type="module" src="lib/app.js"></script>
</body>
</html>
